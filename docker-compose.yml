services:
  media-organizer:
    build: .
    container_name: media-organizer
    restart: unless-stopped
    environment:
      # 业务配置都在 Web 控制台写入 /config/settings.json
      CONFIG_FILE: /config/settings.json
      LOG_LEVEL: INFO

    ports:
      - "8000:8000"

    volumes:
      # NAS 文件根目录。群晖通常是 /volume1,首次使用后在 Web 中选择 /host/volume1 下的下载/媒体目录。
      - /volume1:/host/volume1
      # 配置文件与状态数据库
      - ./config:/config

    # 如果你的 LiteLLM 容器在同一个 docker network,加上:
    # networks:
    #   - litellm_net

# networks:
#   litellm_net:
#     external: true
